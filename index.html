<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>3D Fortnite - Enemies & Walls</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px; border: 2px solid white;
            border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none;
        }
        #ui {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0,0,0,0.6); padding: 15px; border-radius: 8px;
        }
    </style>
</head>
<body>
    <div id="crosshair"></div>
    <div id="ui">
        <b>Micro Fortnite 3D</b><br>
        Pohyb: WASD | Míření: Myš<br>
        Střelba: Levý klik | <b>Stavba zdi: Klávesa P</b><br>
        Skóre: <span id="score">0</span>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // Nastavení scény
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 0, 70);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.5);
        scene.add(light);

        // Země
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(200, 200),
            new THREE.MeshPhongMaterial({ color: 0x3d6e32 })
        );
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // Proměnné
        let score = 0;
        const walls = [];
        const enemies = [];
        const bullets = [];
        const keys = {};
        let pitch = 0, yaw = 0;

        // Ovládání
        document.addEventListener('keydown', (e) => { 
            keys[e.code] = true;
            if(e.code === 'KeyP') placeWall(); 
        });
        document.addEventListener('keyup', (e) => keys[e.code] = false);
        document.addEventListener('mousedown', (e) => {
            if (document.pointerLockElement && e.button === 0) shoot();
            else document.body.requestPointerLock();
        });
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
            }
        });

        // Funkce pro stavbu zdi (Hitbox je součástí Mesh objektu)
        function placeWall() {
            const wallGeo = new THREE.BoxGeometry(3, 3, 0.5);
            const wallMat = new THREE.MeshPhongMaterial({ color: 0x7d4e2d });
            const wall = new THREE.Mesh(wallGeo, wallMat);
            
            const dir = new THREE.Vector3(0, 0, -4).applyQuaternion(camera.quaternion);
            wall.position.copy(camera.position).add(dir);
            wall.position.y = 1.5;
            wall.rotation.y = yaw;
            
            scene.add(wall);
            walls.push(wall);
        }

        // Střelba
        function shoot() {
            const bullet = new THREE.Mesh(
                new THREE.SphereGeometry(0.15),
                new THREE.MeshBasicMaterial({ color: 0xffcc00 })
            );
            bullet.position.copy(camera.position);
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            bullet.userData.velocity = dir.multiplyScalar(0.8);
            scene.add(bullet);
            bullets.push(bullet);
        }

        // Spawn nepřátel
        function spawnEnemy() {
            const enemy = new THREE.Mesh(
                new THREE.BoxGeometry(1.5, 2, 1.5),
                new THREE.MeshPhongMaterial({ color: 0xff0000 })
            );
            const angle = Math.random() * Math.PI * 2;
            const dist = 30 + Math.random() * 20;
            enemy.position.set(Math.cos(angle) * dist, 1, Math.sin(angle) * dist);
            scene.add(enemy);
            enemies.push(enemy);
        }
        setInterval(spawnEnemy, 3000);

        // Kontrola kolize se zdmi (jednoduchý Raycast)
        function checkWallCollision(nextPos) {
            for (let wall of walls) {
                const box = new THREE.Box3().setFromObject(wall);
                if (box.containsPoint(nextPos)) return true;
            }
            return false;
        }

        camera.position.y = 1.6;

        function animate() {
            requestAnimationFrame(animate);

            if (document.pointerLockElement) {
                const moveDist = 0.12;
                const nextPos = camera.position.clone();
                
                if (keys['KeyW']) nextPos.add(new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion).multiplyScalar(moveDist));
                if (keys['KeyS']) nextPos.add(new THREE.Vector3(0,0,1).applyQuaternion(camera.quaternion).multiplyScalar(moveDist));
                if (keys['KeyA']) nextPos.add(new THREE.Vector3(-1,0,0).applyQuaternion(camera.quaternion).multiplyScalar(moveDist));
                if (keys['KeyD']) nextPos.add(new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion).multiplyScalar(moveDist));
                
                nextPos.y = 1.6; // fixní výška postavy
                
                // Hitbox pro hráče vs zdi
                if (!checkWallCollision(nextPos)) {
                    camera.position.copy(nextPos);
                }
            }

            // Pohyb a kolize kulek
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.position.add(b.userData.velocity);
                
                // Kulka trefila zeď
                if (checkWallCollision(b.position)) {
                    scene.remove(b);
                    bullets.splice(i, 1);
                    continue;
                }

                // Kulka trefila nepřítele
                for (let j = enemies.length - 1; j >= 0; j--) {
                    if (b.position.distanceTo(enemies[j].position) < 1.5) {
                        scene.remove(enemies[j]);
                        enemies.splice(j, 1);
                        scene.remove(b);
                        bullets.splice(i, 1);
                        score += 10;
                        document.getElementById('score').innerText = score;
                        break;
                    }
                }
            }

            // Pohyb nepřátel k hráči
            enemies.forEach(en => {
                const dir = camera.position.clone().sub(en.position).normalize();
                en.position.x += dir.x * 0.05;
                en.position.z += dir.z * 0.05;
                
                if (en.position.distanceTo(camera.position) < 1.5) {
                    alert("Dostali tě! Skóre: " + score);
                    location.reload();
                }
            });

            renderer.render(scene, camera);
        }

        animate();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
