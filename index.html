<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>2D Micro Fortnite</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: sans-serif; }
        canvas { display: block; background: #4a7c44; } /* Tráva */
        #ui {
            position: absolute; top: 10px; left: 10px; color: white;
            text-shadow: 2px 2px 0 #000; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h1>Micro Fortnite</h1>
        <p>Pohyb: WASD | Střelba: Levý klik | Stavba zdi: Pravý klik</p>
        <p>Skóre: <span id="score">0</span></p>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let score = 0;
    const player = { x: canvas.width/2, y: canvas.height/2, size: 20, speed: 4, color: '#3498db' };
    const bullets = [];
    const enemies = [];
    const walls = [];
    const keys = {};

    // Ovládání
    window.onkeydown = e => keys[e.key.toLowerCase()] = true;
    window.onkeyup = e => keys[e.key.toLowerCase()] = false;
    window.oncontextmenu = e => {
        e.preventDefault();
        walls.push({ x: e.clientX - 15, y: e.clientY - 15, w: 30, h: 30 });
    };
    window.onclick = e => {
        const angle = Math.atan2(e.clientY - player.y, e.clientX - player.x);
        bullets.push({ x: player.x, y: player.y, vx: Math.cos(angle) * 8, vy: Math.sin(angle) * 8 });
    };

    function spawnEnemy() {
        const side = Math.floor(Math.random() * 4);
        let x, y;
        if(side === 0) { x = Math.random() * canvas.width; y = -20; }
        else if(side === 1) { x = canvas.width + 20; y = Math.random() * canvas.height; }
        else if(side === 2) { x = Math.random() * canvas.width; y = canvas.height + 20; }
        else { x = -20; y = Math.random() * canvas.height; }
        enemies.push({ x, y, size: 20, speed: 1.5 });
    }
    setInterval(spawnEnemy, 2000);

    function update() {
        // Pohyb hráče
        if (keys['w']) player.y -= player.speed;
        if (keys['s']) player.y += player.speed;
        if (keys['a']) player.x -= player.speed;
        if (keys['d']) player.x += player.speed;

        // Kulky
        bullets.forEach((b, i) => {
            b.x += b.vx; b.y += b.vy;
            if(b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) bullets.splice(i, 1);
        });

        // Nepřátelé a kolize
        enemies.forEach((en, i) => {
            const angle = Math.atan2(player.y - en.y, player.x - en.x);
            en.x += Math.cos(angle) * en.speed;
            en.y += Math.sin(angle) * en.speed;

            // Kolize s kulkou
            bullets.forEach((b, bi) => {
                if (Math.hypot(en.x - b.x, en.y - b.y) < en.size) {
                    enemies.splice(i, 1);
                    bullets.splice(bi, 1);
                    score += 10;
                    scoreEl.innerText = score;
                }
            });

            // Kolize se zdí
            walls.forEach(w => {
                if (en.x > w.x && en.x < w.x + w.w && en.y > w.y && en.y < w.y + w.h) {
                    en.speed = 0; // Zeď nepřítele zastaví
                } else { en.speed = 1.5; }
            });

            if (Math.hypot(en.x - player.x, en.y - player.y) < player.size) {
                alert("Game Over! Skóre: " + score);
                location.reload();
            }
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Zdi
        ctx.fillStyle = '#2980b9';
        walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));

        // Kulky
        ctx.fillStyle = 'yellow';
        bullets.forEach(b => ctx.beginPath() || ctx.arc(b.x, b.y, 5, 0, Math.PI*2) || ctx.fill());

        // Nepřátelé
        ctx.fillStyle = '#e74c3c';
        enemies.forEach(en => ctx.fillRect(en.x - en.size/2, en.y - en.size/2, en.size, en.size));

        // Hráč
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x - player.size/2, player.y - player.size/2, player.size, player.size);

        requestAnimationFrame(() => { update(); draw(); });
    }

    draw();
</script>
</body>
</html>
