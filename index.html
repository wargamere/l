<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>3D Micro Fortnite</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px;
            border: 2px solid white; border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none;
        }
        #instructions {
            position: absolute; bottom: 20px; left: 20px;
            color: white; background: rgba(0,0,0,0.5); padding: 10px;
        }
    </style>
</head>
<body>
    <div id="crosshair"></div>
    <div id="instructions">Klikni pro start | WASD: Pohyb | Myš: Míření | L-Klik: Střelba | P-Klik: Stavba</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // 1. SCÉNA A KAMERA
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // Obloha
        scene.fog = new THREE.Fog(0x87ceeb, 0, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. SVĚTLO
        const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.5);
        scene.add(light);

        // 3. TERÉN (Tráva)
        const floorGeo = new THREE.PlaneGeometry(100, 100);
        const floorMat = new THREE.MeshPhongMaterial({ color: 0x4a7c44 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // 4. LOGIKA HRÁČE
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        document.addEventListener('mousedown', () => document.body.requestPointerLock());
        document.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW') moveForward = true;
            if(e.code === 'KeyS') moveBackward = true;
            if(e.code === 'KeyA') moveLeft = true;
            if(e.code === 'KeyD') moveRight = true;
        });
        document.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') moveForward = false;
            if(e.code === 'KeyS') moveBackward = false;
            if(e.code === 'KeyA') moveLeft = false;
            if(e.code === 'KeyD') moveRight = false;
        });

        // Myš - Otáčení
        let pitch = 0, yaw = 0;
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
            }
        });

        // 5. STŘELBA A STAVĚNÍ
        const walls = [];
        document.addEventListener('mousedown', (e) => {
            if (!document.pointerLockElement) return;
            
            if (e.button === 0) { // Levý klik - Střela
                const bulletGeo = new THREE.SphereGeometry(0.1);
                const bulletMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
                const bullet = new THREE.Mesh(bulletGeo, bulletMat);
                bullet.position.copy(camera.position);
                const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                bullet.userData.velocity = dir.multiplyScalar(0.5);
                scene.add(bullet);
                setTimeout(() => scene.remove(bullet), 2000);
            } 
            else if (e.button === 2) { // Pravý klik - Stavba
                const wallGeo = new THREE.BoxGeometry(2, 2, 0.2);
                const wallMat = new THREE.MeshPhongMaterial({ color: 0x8b4513 });
                const wall = new THREE.Mesh(wallGeo, wallMat);
                
                // Umístění zdi před hráče
                const dir = new THREE.Vector3(0, 0, -3).applyQuaternion(camera.quaternion);
                wall.position.copy(camera.position).add(dir);
                wall.position.y = 1;
                wall.rotation.y = camera.rotation.y;
                scene.add(wall);
            }
        });

        // 6. HERNÍ SMYČKA
        camera.position.y = 1.6; // Výška očí

        function animate() {
            requestAnimationFrame(animate);

            if (document.pointerLockElement) {
                // Pohyb
                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                const speed = 0.1;
                if (moveForward || moveBackward) camera.translateZ(-direction.z * speed);
                if (moveLeft || moveRight) camera.translateX(direction.x * speed);
                camera.position.y = 1.6; // Udržet na zemi
            }

            // Pohyb kulek (pokud nějaké jsou v scéně, v reálném kódu by to chtělo pole)
            scene.children.forEach(child => {
                if(child.userData.velocity) {
                    child.position.add(child.userData.velocity);
                }
            });

            renderer.render(scene, camera);
        }

        animate();

        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
