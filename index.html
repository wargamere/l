<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Wordle</title>
    <style>
        :root {
            --correct: #6aaa64;
            --present: #c9b458;
            --absent: #787c7e;
            --border: #d3d6da;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #ffffff;
            color: #1a1a1b;
        }

        #game-board {
            display: grid;
            grid-template-rows: repeat(6, 1fr);
            grid-gap: 5px;
            margin-top: 20px;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-gap: 5px;
        }

        .tile {
            width: 60px;
            height: 60px;
            border: 2px solid var(--border);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
            transition: transform 0.2s;
        }

        .tile.filled { border-color: #878a8c; }
        .tile.correct { background-color: var(--correct); color: white; border: none; }
        .tile.present { background-color: var(--present); color: white; border: none; }
        .tile.absent { background-color: var(--absent); color: white; border: none; }

        #message {
            height: 30px;
            margin: 20px;
            font-weight: bold;
            color: #d32f2f;
        }
    </style>
</head>
<body>

    <h1>WORDLE CZ</h1>
    <div id="game-board"></div>
    <div id="message"></div>
    <p>Pište na klávesnici a potvrďte Enterem.</p>

    <script>
        const ANSWER = "CESTA"; // Zde můžeš změnit hledané slovo (musí mít 5 písmen)
        const MAX_ATTEMPTS = 6;
        let currentAttempt = 0;
        let currentTile = 0;
        let guesses = ["", "", "", "", "", ""];
        let gameOver = false;

        const board = document.getElementById("game-board");
        const messageDisplay = document.getElementById("message");

        // Inicializace herní plochy
        function initBoard() {
            for (let i = 0; i < MAX_ATTEMPTS; i++) {
                let row = document.createElement("div");
                row.className = "row";
                for (let j = 0; j < 5; j++) {
                    let tile = document.createElement("div");
                    tile.className = "tile";
                    tile.id = `tile-${i}-${j}`;
                    row.appendChild(tile);
                }
                board.appendChild(row);
            }
        }

        function updateBoard() {
            for (let i = 0; i < 5; i++) {
                const tile = document.getElementById(`tile-${currentAttempt}-${i}`);
                tile.textContent = guesses[currentAttempt][i] || "";
                tile.classList.toggle("filled", !!guesses[currentAttempt][i]);
            }
        }

        function submitGuess() {
            const guess = guesses[currentAttempt];
            if (guess.length !== 5) {
                showMessage("Málo písmen!");
                return;
            }

            checkRow(guess);
            
            if (guess === ANSWER) {
                showMessage("Skvěle! Vyhrál jsi!");
                gameOver = true;
            } else if (currentAttempt === MAX_ATTEMPTS - 1) {
                showMessage(`Konec hry! Slovo bylo: ${ANSWER}`);
                gameOver = true;
            } else {
                currentAttempt++;
                currentTile = 0;
            }
        }

        function checkRow(guess) {
            const rowTiles = board.children[currentAttempt].children;
            const answerArray = ANSWER.split("");

            // První průchod: Najdi správná písmena (zelená)
            for (let i = 0; i < 5; i++) {
                if (guess[i] === ANSWER[i]) {
                    rowTiles[i].classList.add("correct");
                    answerArray[i] = null;
                }
            }

            // Druhý průchod: Najdi přítomná písmena (žlutá)
            for (let i = 0; i < 5; i++) {
                if (!rowTiles[i].classList.contains("correct")) {
                    const index = answerArray.indexOf(guess[i]);
                    if (index !== -1) {
                        rowTiles[i].classList.add("present");
                        answerArray[index] = null;
                    } else {
                        rowTiles[i].classList.add("absent");
                    }
                }
            }
        }

        function showMessage(msg) {
            messageDisplay.textContent = msg;
            setTimeout(() => { if(!gameOver) messageDisplay.textContent = ""; }, 2000);
        }

        window.addEventListener("keydown", (e) => {
            if (gameOver) return;

            if (e.key === "Enter") {
                submitGuess();
            } else if (e.key === "Backspace") {
                guesses[currentAttempt] = guesses[currentAttempt].slice(0, -1);
                updateBoard();
            } else if (/^[a-zěščřžýáíéóúů]$/i.test(e.key) && guesses[currentAttempt].length < 5) {
                guesses[currentAttempt] += e.key.toUpperCase();
                updateBoard();
            }
        });

        initBoard();
    </script>
</body>
</html>
